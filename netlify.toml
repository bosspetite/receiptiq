[build]
  base = "server"
  command = "npm install"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = [
    "@supabase/supabase-js",
    "cors",
    "dotenv",
    "express",
    "multer",
    "serverless-http"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/.netlify/functions/api/"
  status = 200
  force = true
